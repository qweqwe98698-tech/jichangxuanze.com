name: Auto Generate & FTP Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *' # 每天凌晨 2 点自动运行一次生成与部署
  workflow_dispatch: # 允许在 GitHub 后台手动点击运行

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 检出代码 (Checkout)
      uses: actions/checkout@v3

    - name: 2. 安装 Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: 3. 安装依赖包
      run: npm install

    - name: 4. 运行 DeepSeek AI 自动生成评测文章与资讯博客
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        node scripts/generate.js
        node scripts/generate_blog.js

    - name: 5. 部署到老薛主机 (FTP Deploy)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # 按照您的要求，强制部署到老薛主机的 public_html 目录下
        server-dir: public_html/jichangxuanze.com/
