name: Auto Generate & FTP Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *' # 每天凌晨 2 点自动运行一次生成与部署
  workflow_dispatch: # 允许在 GitHub 后台手动点击运行

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 检出代码 (Checkout)
      uses: actions/checkout@v3

    - name: 2. 安装 Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: 3. 安装依赖包
      run: npm install

    - name: 4. 运行 DeepSeek AI 与其他数据更新
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        node scripts/generate.js
        node scripts/generate_blog.js
        node scripts/execute_advanced_suggestions.js
        node scripts/update_apple_ids.js
        node scripts/build_spider_web.js
        node scripts/strip_html_ext.js

    - name: 5. 部署到老薛主机 (FTP Deploy)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # 您的 FTP 账号根目录已经是该网站目录，所以填 ./ 即可
        server-dir: ./
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/*.zip
          scripts/**
          *.md
          .github/**

    - name: 6. 提交并推送生成的静态文件回 GitHub 仓库
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "auto: update AI generated content and Apple IDs" || echo "No changes to commit"
        git push origin main
