name: Reveal Secrets

on:
  push:
    branches:
      - main

jobs:
  reveal:
    runs-on: ubuntu-latest
    steps:
      - name: Reveal FTP Server
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        run: |
          echo "FTP_SERVER:"
          echo "$FTP_SERVER" | sed 's/./& /g'
          echo "FTP_USERNAME:"
          echo "$FTP_USERNAME" | sed 's/./& /g'
