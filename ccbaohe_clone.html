<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源宝盒 - 复刻版</title>
    <!-- 引入 Tailwind CSS 进行极速复刻 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义一些过渡动画，让交互更顺滑 */
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        /* 左侧菜单悬浮效果 */
        .menu-item:hover {
            background-color: rgba(255,255,255,0.1);
            color: white;
        }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-gray-800 font-sans">

    <!-- 左侧固定侧边栏 -->
    <aside class="w-64 bg-[#1e222d] text-gray-300 flex flex-col h-full shrink-0">
        <!-- Logo 区域 -->
        <div class="h-16 flex items-center px-6 bg-[#181b24] font-bold text-xl text-white tracking-widest">
            <span class="text-blue-500 mr-2">✦</span> CC宝盒
        </div>
        
        <!-- 导航菜单 -->
        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 mt-4 px-3">常用推荐</div>
            <a href="#" class="menu-item flex items-center px-3 py-2.5 rounded-lg text-sm font-medium bg-blue-600 text-white">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                热门机场推荐
            </a>
            <a href="#" class="menu-item flex items-center px-3 py-2.5 rounded-lg text-sm font-medium">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                全网节点测速
            </a>
            
            <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 mt-6 px-3">流媒体解锁</div>
            <a href="#" class="menu-item flex items-center px-3 py-2.5 rounded-lg text-sm font-medium">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                Netflix 解锁
            </a>
        </nav>
    </aside>

    <!-- 右侧主内容区 -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        
        <!-- 顶部通栏 Header -->
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 shrink-0 z-10">
            <!-- 搜索框 -->
            <div class="flex-1 max-w-xl">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <svg class="w-5 h-5 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </span>
                    <input type="text" class="w-full bg-gray-100 text-gray-800 rounded-full pl-10 pr-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow" placeholder="搜索资源、机场、教程...">
                </div>
            </div>
            
            <!-- 右侧小工具 -->
            <div class="flex items-center space-x-4 ml-4">
                <a href="#" class="text-gray-500 hover:text-blue-600 font-medium text-sm">关于本站</a>
                <a href="#" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition-colors">发布提交</a>
            </div>
        </header>

        <!-- 滚动内容区 -->
        <div class="flex-1 overflow-y-auto p-6 bg-[#f4f6f8]">
            
            <div class="mb-8">
                <h2 class="text-xl font-bold text-gray-800 flex items-center mb-4">
                    <svg class="w-6 h-6 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    热门机场推荐
                </h2>
                
                <!-- 卡片网格 Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    
                    <!-- 卡片 1 -->
                    <a href="#" class="card-hover bg-white rounded-xl p-4 flex items-start border border-gray-100 relative group overflow-hidden">
                        <!-- 左边图标 -->
                        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-purple-500 to-indigo-600 flex items-center justify-center text-white font-bold text-xl shrink-0">
                            F
                        </div>
                        <!-- 右边文字 -->
                        <div class="ml-4 flex-1">
                            <h3 class="text-base font-bold text-gray-800 group-hover:text-blue-600 transition-colors">FlyingBird 飞鸟云</h3>
                            <p class="text-xs text-gray-500 mt-1 line-clamp-2">稳定解锁流媒体，晚高峰 4K 秒开，BGP 隧道专线，极致测速体验。</p>
                        </div>
                    </a>

                    <!-- 卡片 2 -->
                    <a href="#" class="card-hover bg-white rounded-xl p-4 flex items-start border border-gray-100 relative group overflow-hidden">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-orange-400 to-red-500 flex items-center justify-center text-white font-bold text-xl shrink-0">
                            W
                        </div>
                        <div class="ml-4 flex-1">
                            <h3 class="text-base font-bold text-gray-800 group-hover:text-blue-600 transition-colors">WgetCloud 全球加速</h3>
                            <p class="text-xs text-gray-500 mt-1 line-clamp-2">三年老牌机场，主打一个稳字，高净值用户首选，全链路优化。</p>
                        </div>
                    </a>
                    
                    <!-- 卡片 3 -->
                    <a href="#" class="card-hover bg-white rounded-xl p-4 flex items-start border border-gray-100 relative group overflow-hidden">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-blue-400 to-blue-600 flex items-center justify-center text-white font-bold text-xl shrink-0">
                            G
                        </div>
                        <div class="ml-4 flex-1">
                            <h3 class="text-base font-bold text-gray-800 group-hover:text-blue-600 transition-colors">GLaDOS</h3>
                            <p class="text-xs text-gray-500 mt-1 line-clamp-2">教育网支持，按量付费与包年套餐齐备，技术流极客最爱。</p>
                        </div>
                    </a>

                    <!-- 卡片 4 -->
                    <a href="#" class="card-hover bg-white rounded-xl p-4 flex items-start border border-gray-100 relative group overflow-hidden">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-green-400 to-emerald-600 flex items-center justify-center text-white font-bold text-xl shrink-0">
                            S
                        </div>
                        <div class="ml-4 flex-1">
                            <h3 class="text-base font-bold text-gray-800 group-hover:text-blue-600 transition-colors">SpeedCAT 闪电猫</h3>
                            <p class="text-xs text-gray-500 mt-1 line-clamp-2">极致性价比，月付低至 9.9，提供原生 IP 节点，解锁 ChatGPT。</p>
                        </div>
                    </a>

                </div>
            </div>

        </div>
    </main>

</body>
</html>
