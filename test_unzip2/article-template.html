<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | 云端甄选</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="canonical" href="https://jichangxuanze.com/{{FILE_NAME}}" />
    <style>
        .article-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 40px;
            background: var(--color-white);
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid var(--color-border);
        }
        .article-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--color-border);
        }
        .article-title {
            font-size: 32px;
            color: var(--color-secondary);
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .article-meta {
            display: flex;
            justify-content: center;
            gap: 16px;
            color: var(--color-text-light);
            font-size: 14px;
        }
        .ai-content h2 {
            font-size: 24px;
            color: var(--color-secondary);
            margin: 40px 0 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .ai-content h2::before {
            content: '';
            display: block;
            width: 4px;
            height: 24px;
            background: var(--color-primary);
            border-radius: 4px;
        }
        .ai-content h3 {
            font-size: 20px;
            color: var(--color-secondary);
            margin: 30px 0 15px;
        }
        .ai-content p {
            font-size: 16px;
            line-height: 1.8;
            color: var(--color-text);
            margin-bottom: 20px;
        }
        .ai-content strong {
            color: var(--color-secondary);
            font-weight: 600;
            background: rgba(182, 141, 64, 0.1);
            padding: 2px 4px;
            border-radius: 4px;
        }
        .ai-content ul, .ai-content ol {
            padding-left: 20px;
            margin-bottom: 20px;
            line-height: 1.8;
            color: var(--color-text);
        }
        .cta-banner {
            background: linear-gradient(135deg, #1F2937, #374151);
            color: white;
            padding: 30px;
            border-radius: var(--radius-md);
            text-align: center;
            margin-top: 40px;
        }
        .cta-banner h3 {
            color: var(--color-primary);
            margin-bottom: 15px;
        }
        .cta-banner p {
            color: #D1D5DB;
            margin-bottom: 20px;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <a href="index" style="display: flex; align-items: center; gap: 8px;">
                    <span class="logo-icon">✨</span>
                    <span class="logo-text">云端甄选 <span style="font-weight: 400; font-size: 16px; opacity: 0.8;">| 智能机场匹配</span></span>
                </a>
            </div>
            <div class="nav-links">
                <a href="index">工具矩阵</a>
                <a href="ranking">权威榜单</a>
                <a href="reviews">深度评测</a>
                <a href="articles" class="active">最新资讯</a>
                <a href="index#tutorials">配置教程</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="article-container">
            <div class="article-header">
                <h1 class="article-title">{{TITLE}}</h1>
                <div class="article-meta">
                    <span>作者：云端极客客座</span>
                    <span>发布日期：{{DATE}}</span>
                    <span>阅读时长：约 8 分钟</span>
                </div>
            </div>

            <div class="ai-content">
                {{CONTENT}}
            </div>
            
            <!-- 底部强力引流转化块 -->
            <div class="cta-banner">
                <h3>💡 还在为网络卡顿和封号烦恼？</h3>
                <p>我们为您整理了 2026 年最新一期的高性价比、高稳定性专线列表。支持全平台一键托管，原生 IP 解锁所有限制。</p>
                <a href="ranking" class="btn btn-primary" style="font-weight: 600;">👉 立即查看本周权威榜单与特惠</a>
            </div>

            <div style="text-align: center; margin-top: 40px;">
                <a href="articles" class="btn btn-outline">← 返回资讯列表页</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container footer-content" style="padding: 40px 0;">
            <p>&copy; 2026 jichangxuanze.com 云端甄选. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
